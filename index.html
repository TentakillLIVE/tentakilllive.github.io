<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tentakill — Project Hub</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=bungee:400|fira-code:400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #09090b;
            --surface:  #18181b;
            --elevated: #27272a;
            --border:   #3f3f46;
            --text:     #f4f4f5;
            --muted:    #a1a1aa;
            --accent:   #f95a1f;
            --accent-dim: rgba(249, 90, 31, 0.12);
            --code-bg:  #0d0d0f;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: ui-sans-serif, system-ui, sans-serif;
            font-size: 14px;
            line-height: 1.65;
            min-height: 100vh;
        }

        /* ── Animated noise grain overlay ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.025;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Accent glow blob ── */
        body::after {
            content: '';
            position: fixed;
            top: -25vh;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(249,90,31,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Header ── */
        .page-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(9,9,11,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .logo-dot {
            width: 12px; height: 12px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s cubic-bezier(0.4,0,0.6,1) infinite;
            align-self: center;
            flex-shrink: 0;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

        .logo-wordmark {
            font-family: 'Bungee', sans-serif;
            font-size: 20px;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            color: var(--accent);
        }
        .logo-wordmark span { color: var(--text); }
        .logo-sub {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .header-links {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }
        .header-links a {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            transition: all 0.2s;
        }
        .header-links a:hover {
            color: var(--text);
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        .header-links a svg {
            width: 18px;
            height: 18px;
        }

        /* ── Main content ── */
        .page {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 32px 100px;
        }

        /* ── Hero ── */
        .hero {
            text-align: center;
            margin-bottom: 48px;
        }

        .hero h1 {
            font-family: 'Bungee', sans-serif;
            font-size: clamp(36px, 7vw, 56px);
            line-height: 1;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }
        .hero h1 em {
            font-style: normal;
            color: var(--accent);
        }

        /* ── Category sections ── */
        .category {
            margin-bottom: 56px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .category-label {
            font-family: 'Bungee', sans-serif;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            padding: 4px 12px;
            background: var(--accent-dim);
            border: 1px solid rgba(249, 90, 31, 0.25);
            border-radius: 6px;
        }

        .category-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--border), transparent);
        }

        /* ── Projects Grid ── */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        /* ── Project Card ── */
        .project-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(249,90,31,0.03) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }

        .project-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), 0 8px 32px rgba(0,0,0,0.4);
            transform: translateY(-2px);
        }
        .project-card:hover::before { opacity: 1; }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .card-icon {
            width: 44px;
            height: 44px;
            background: var(--elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
            transition: all 0.25s;
        }
        .project-card:hover .card-icon {
            background: var(--accent-dim);
            border-color: rgba(249, 90, 31, 0.3);
        }

        .card-titles {
            flex: 1;
            min-width: 0;
        }

        .card-name {
            font-family: 'Bungee', sans-serif;
            font-size: 16px;
            letter-spacing: -0.01em;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 2px;
            line-height: 1.2;
        }

        .card-tagline {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.4;
        }

        .card-description {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
            flex: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .card-tag {
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--muted);
            background: var(--elevated);
            border: 1px solid var(--border);
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: lowercase;
        }

        .card-arrow {
            width: 28px;
            height: 28px;
            background: var(--elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            flex-shrink: 0;
            transition: all 0.25s;
        }
        .project-card:hover .card-arrow {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        /* ── Status badge ── */
        .card-status {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
        }
        .card-status.live {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .card-status.dev {
            background: rgba(234, 179, 8, 0.15);
            color: #eab308;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }
        .card-status.archived {
            background: var(--elevated);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        /* ── Footer ── */
        footer {
            position: relative;
            z-index: 1;
            border-top: 1px solid var(--border);
            padding: 24px 32px;
            text-align: center;
        }
        footer p {
            font-size: 12px;
            color: var(--muted);
        }
        footer a {
            color: var(--accent);
            text-decoration: none;
        }
        footer a:hover { text-decoration: underline; }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .page-header { padding: 12px 16px; }
            .page { padding: 40px 16px 60px; }
            .projects-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 36px; }
        }

        /* ── Animation on load ── */
        .project-card {
            animation: cardFadeIn 0.5s ease both;
        }
        .project-card:nth-child(1) { animation-delay: 0.05s; }
        .project-card:nth-child(2) { animation-delay: 0.10s; }
        .project-card:nth-child(3) { animation-delay: 0.15s; }
        .project-card:nth-child(4) { animation-delay: 0.20s; }
        .project-card:nth-child(5) { animation-delay: 0.25s; }
        .project-card:nth-child(6) { animation-delay: 0.30s; }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header class="page-header">
    <div class="logo">
        <div class="logo-dot"></div>
        <div class="logo-wordmark">Tenta<span>kill</span></div>
        <div class="logo-sub">Projects</div>
    </div>
    <nav class="header-links">
        <a href="https://www.twitch.tv/tentakill" target="_blank" rel="noopener noreferrer" title="Twitch">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>

        <a href="https://bsky.app/profile/tentakill.com" target="_blank" rel="noopener noreferrer" title="Bluesky">

        </a>
        <a href="https://github.com/TentakillLIVE" target="_blank" rel="noopener noreferrer" title="GitHub">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
        </a>
    </nav>
</header>

<main class="page">

    <section class="hero">
        <h1><em>Project</em> Hub</h1>
    </section>

    <!-- Cards are loaded from cards.html -->
    <div id="cards-container"></div>

</main>

<footer>
    <p>Tentakill</p>
</footer>

<script>
// Load cards from separate file
fetch('cards.html')
    .then(response => {
        if (!response.ok) throw new Error('Failed to load cards');
        return response.text();
    })
    .then(html => {
        const container = document.getElementById('cards-container');
        container.innerHTML = html;
        
        // Re-trigger animations for dynamically loaded cards
        const cards = container.querySelectorAll('.project-card');
        cards.forEach((card, i) => {
            card.style.animationDelay = `${0.05 * (i + 1)}s`;
        });
    })
    .catch(err => {
        console.error('Error loading cards:', err);
        document.getElementById('cards-container').innerHTML = 
            '<p style="color: var(--muted); text-align: center; padding: 40px;">Unable to load projects. Make sure cards.html is in the same directory.</p>';
    });
</script>

</body>
</html>
